<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 LDR Monitor – Control LED</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay"></div>

  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">💡</div>
        <span>LDR Monitor</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <p class="nav-section-title">Menú</p>
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="led.html"       class="nav-item active">💡 Control LED</a>
      <a href="config.html"    class="nav-item">⚙️ Configuración</a>
      <a href="reports.html"   class="nav-item">📋 Reportes</a>
      <a href="credits.html"   class="nav-item">ℹ️ Créditos</a>
    </div>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">U</div>
        <div class="user-details">
          <div class="user-name" id="sidebar-username">Usuario</div>
          <div class="user-role">Operador</div>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-block btn-sm">🚪 Cerrar Sesión</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:.75rem">
        <button class="mobile-menu-btn">☰</button>
        <span class="topbar-title">💡 Control LED</span>
      </div>
      <div class="topbar-right">
        <span class="current-time" id="current-time"></span>
      </div>
    </div>

    <div class="page-content">
      <div class="card" style="max-width:760px;margin:0 auto">
        <div class="card-header">
          <span class="card-title">🔌 Estado del LED en ESP32</span>
          <button id="refresh-led-btn" class="btn btn-secondary btn-sm">🔄 Actualizar</button>
        </div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr;gap:1rem">
            <div style="background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:1rem">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
                <div>
                  <div style="font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Pin de control</div>
                  <div id="led-pin" style="font-size:1.2rem;font-weight:700;color:#fff;margin-top:.2rem">GPIO 32</div>
                </div>
                <div>
                  <div style="font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Estado actual</div>
                  <div id="led-status" style="font-size:1.2rem;font-weight:700;color:#fff;margin-top:.2rem">Cargando...</div>
                </div>
              </div>
            </div>

            <div style="display:flex;gap:.75rem;flex-wrap:wrap">
              <button id="led-on-btn" class="btn btn-success">🟢 Encender LED</button>
              <button id="led-off-btn" class="btn btn-danger">⚫ Apagar LED</button>
            </div>

            <p id="led-updated-at" style="font-size:.82rem;color:var(--text-muted)">Última actualización: --</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/led.js"></script>
</body>
</html>
