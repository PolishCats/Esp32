<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 LDR Monitor – Iniciar Sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💡</div>
      <h1>ESP32 LDR Monitor</h1>
      <p>Sistema de Monitoreo de Sensor de Luz</p>
    </div>

    <div id="login-alert" class="alert"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Usuario o Email</label>
        <input id="username" name="username" type="text" class="form-control"
               placeholder="tu_usuario" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-group">
          <input id="password" name="password" type="password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" title="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <button id="login-btn" type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">
        <span>🔑</span> Iniciar Sesión
      </button>
    </form>

    <div class="divider">o</div>

    <div class="auth-footer">
      ¿No tienes cuenta?
      <a href="register.html">Regístrate aquí</a>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
