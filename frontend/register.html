<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 LDR Monitor – Registro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🔆</div>
      <h1>Crear Cuenta</h1>
      <p>ESP32 LDR Monitor</p>
    </div>

    <div id="register-alert" class="alert"></div>

    <form id="register-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input id="username" name="username" type="text" class="form-control"
               placeholder="mi_usuario" autocomplete="username" required minlength="3" maxlength="50">
        <p class="form-hint">3–50 caracteres, sin espacios</p>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" class="form-control"
               placeholder="correo@ejemplo.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-group">
          <input id="password" name="password" type="password" class="form-control"
                 placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8">
          <button type="button" class="toggle-pw" title="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmar contraseña</label>
        <div class="input-group">
          <input id="confirm_password" name="confirm_password" type="password" class="form-control"
                 placeholder="Repite la contraseña" autocomplete="new-password" required minlength="8">
          <button type="button" class="toggle-pw" title="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <button id="register-btn" type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">
        <span>👤</span> Crear Cuenta
      </button>
    </form>

    <div class="divider">o</div>

    <div class="auth-footer">
      ¿Ya tienes cuenta?
      <a href="index.html">Inicia sesión aquí</a>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
